<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/careers/">
    <link rel="canonical" href="/careers/">
</head>
<body>
    <script>
        // Preserve any hash fragment (like #bottom)
        const hash = window.location.hash;
        window.location.replace("/careers/" + hash);
    </script>
    <p>If you are not redirected automatically, <a href="/careers/">click here</a>.</p>
</body>
</html>
